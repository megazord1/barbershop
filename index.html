<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BarberShop Cloud - Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input, select { font-size: 16px !important; color: #18181b !important; background-color: #ffffff !important; }
        .btn-horario:disabled { background-color: #f4f4f5; color: #d4d4d8; cursor: not-allowed; opacity: 0.6; }
        .horario-selecionado { background-color: #f59e0b !important; color: white !important; }
        select option { color: #000000; background: #ffffff; }
    </style>
</head>
<body class="bg-zinc-50 text-zinc-800">

    <header class="bg-zinc-900 text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black italic uppercase tracking-tighter">Barber<span class="text-amber-500">Shop</span></h1>
            <nav class="flex gap-2 items-center">
                <button onclick="switchTab('cliente')" class="px-3 py-2 text-sm font-bold">Agendar</button>
                <button id="btn-admin-nav" onclick="verificarLogin()" class="bg-amber-500 px-4 py-2 rounded-lg text-zinc-900 font-bold text-sm">Admin</button>
                <!-- BOTÃO DE SAIR -->
                <button id="btn-sair" onclick="logout()" class="hidden bg-red-500/10 text-red-500 px-3 py-2 rounded-lg font-bold text-xs border border-red-500/20">Sair</button>
            </nav>
        </div>
    </header>

    <!-- ABA LOGIN -->
    <main id="tab-login" class="tab-content p-6">
        <div class="max-w-sm mx-auto bg-white p-8 rounded-2xl shadow-xl mt-10 border">
            <h2 class="text-2xl font-bold mb-6 text-center">Acesso Admin</h2>
            <input type="text" id="login-user" placeholder="Usuário" class="w-full border p-3 rounded-xl mb-4 outline-none">
            <input type="password" id="login-pass" placeholder="Senha" class="w-full border p-3 rounded-xl mb-6 outline-none">
            <button onclick="tentarLogin()" class="w-full bg-zinc-900 text-white py-4 rounded-xl font-bold">ENTRAR</button>
        </div>
    </main>

    <!-- ABA CLIENTE -->
    <main id="tab-cliente" class="tab-content active p-4">
        <div class="max-w-md mx-auto bg-white rounded-3xl shadow-2xl border border-zinc-200 overflow-hidden">
            <div class="bg-amber-500 p-8 text-zinc-900 text-center">
                <h2 class="text-2xl font-black uppercase italic">Agendamento</h2>
                <p class="text-xs font-bold opacity-70">Sincronizado com a Nuvem</p>
            </div>
            
            <form id="form-agendamento" onsubmit="realizarAgendamento(event)" class="p-6 space-y-5">
                <div>
                    <label class="text-[10px] font-bold text-zinc-400 uppercase ml-1">Seu Nome</label>
                    <input type="text" id="cliente-nome" placeholder="Digite seu nome" required class="w-full border-2 p-3 rounded-2xl outline-none focus:border-amber-500">
                </div>
                
                <div>
                    <label class="text-[10px] font-bold text-zinc-400 uppercase ml-1">Serviço</label>
                    <select id="select-servicos" required class="w-full border-2 p-3 rounded-2xl outline-none bg-white border-zinc-100 text-zinc-900"></select>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-amber-600 uppercase ml-1">Barbeiro Profissional</label>
                    <select id="select-barbeiros-cliente" onchange="gerarGradeHorarios()" required class="w-full border-2 border-amber-500 p-3 rounded-2xl outline-none bg-white font-bold text-zinc-900"></select>
                </div>
                
                <div>
                    <label class="text-[10px] font-bold text-zinc-400 uppercase ml-1">Data</label>
                    <input type="date" id="agendamento-dia" required onchange="gerarGradeHorarios()" class="w-full border-2 p-3 rounded-2xl outline-none bg-white">
                </div>

                <div id="grade-horarios" class="grid grid-cols-3 gap-2 pt-2"></div>
                <input type="hidden" id="horario-selecionado">
                
                <button type="submit" id="btn-confirmar" disabled class="w-full bg-zinc-300 text-white py-5 rounded-2xl font-black uppercase shadow-lg transition-all">Selecione o horário</button>
            </form>
        </div>
    </main>

    <!-- ABA ADMIN -->
    <main id="tab-admin" class="tab-content p-4">
        <div class="max-w-6xl mx-auto grid lg:grid-cols-4 gap-6">
            <section class="bg-white p-6 rounded-3xl shadow-sm border">
                <h3 class="font-black mb-4 text-amber-600 text-xs uppercase tracking-tighter">Equipe de Barbeiros</h3>
                <div class="flex gap-2 mb-6">
                    <input type="text" id="novo-barbeiro-nome" placeholder="Novo nome" class="w-full border p-3 rounded-xl text-sm outline-none">
                    <button onclick="adicionarBarbeiro()" class="bg-zinc-900 text-white px-4 rounded-xl font-bold">+</button>
                </div>
                <div id="lista-barbeiros-admin" class="space-y-3"></div>
            </section>

            <section class="bg-white p-6 rounded-3xl shadow-sm border">
                <h3 class="font-black mb-4 text-amber-600 text-xs uppercase tracking-tighter">Serviços e Preços</h3>
                <div class="space-y-3 mb-6">
                    <input type="text" id="novo-servico-nome" placeholder="Nome do serviço" class="w-full border p-3 rounded-xl text-sm outline-none">
                    <input type="number" id="novo-servico-preco" placeholder="Preço (ex: 50)" class="w-full border p-3 rounded-xl text-sm outline-none">
                    <button onclick="adicionarServico()" class="w-full bg-zinc-900 text-white py-3 rounded-xl font-bold uppercase text-xs">Adicionar</button>
                </div>
                <div id="lista-servicos-admin" class="space-y-3 pt-4 border-t"></div>
            </section>
            
            <section class="lg:col-span-2 bg-white p-6 rounded-3xl shadow-sm border">
                <h3 class="font-black mb-4 text-zinc-400 text-xs uppercase italic">Agenda Geral</h3>
                <div id="lista-agendamentos" class="space-y-4"></div>
            </section>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://sryebanfwnbmsazsyxdc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_TkSVYwSMcyVn5k4byo7cnQ_4ULn_jCB';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isLogged = false;

        async function switchTab(tab) {
            if (tab === 'admin' && !isLogged) tab = 'login';
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            renderizarTudo();
        }

        function verificarLogin() { isLogged ? switchTab('admin') : switchTab('login'); }
        
        function tentarLogin() {
            if (document.getElementById('login-user').value === "admin" && 
                document.getElementById('login-pass').value === "1234") {
                isLogged = true; 
                document.getElementById('btn-sair').classList.remove('hidden');
                document.getElementById('btn-admin-nav').classList.add('hidden');
                switchTab('admin');
            } else alert("Senha incorreta!");
        }

        function logout() {
            isLogged = false;
            document.getElementById('btn-sair').classList.add('hidden');
            document.getElementById('btn-admin-nav').classList.remove('hidden');
            switchTab('cliente');
        }

        async function renderizarTudo() {
            const { data: barbs } = await _supabase.from('barbeiros').select('*').order('nome');
            if (barbs) {
                document.getElementById('select-barbeiros-cliente').innerHTML = 
                    '<option value="" disabled selected>Escolha seu barbeiro</option>' +
                    barbs.map(b => `<option value="${b.nome}">${b.nome}</option>`).join('');
                document.getElementById('lista-barbeiros-admin').innerHTML = barbs.map(b => `
                    <div class="flex justify-between items-center bg-zinc-50 p-3 rounded-2xl border text-sm">
                        <span class="font-bold">${b.nome}</span>
                        <button onclick="removerBarbeiro(${b.id})" class="text-red-400 font-bold px-2 text-xs">Remover</button>
                    </div>`).join('');
            }

            const { data: servs } = await _supabase.from('servicos').select('*').order('nome');
            if (servs) {
                document.getElementById('select-servicos').innerHTML = 
                    '<option value="" disabled selected>Escolha o que vai fazer</option>' +
                    servs.map(s => `<option value="${s.nome}">${s.nome} - R$ ${s.preco}</option>`).join('');
                document.getElementById('lista-servicos-admin').innerHTML = servs.map(s => `
                    <div class="bg-zinc-50 p-4 rounded-2xl border flex justify-between items-center shadow-sm">
                        <div>
                            <p class="font-bold text-sm">${s.nome}</p>
                            <p class="text-amber-600 font-bold text-xs">R$ ${s.preco}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editarPrecoServico(${s.id}, '${s.nome}', ${s.preco})" class="bg-blue-100 text-blue-600 px-3 py-1 rounded-lg text-[10px] font-black uppercase">Editar</button>
                            <button onclick="removerServico(${s.id})" class="text-red-400">✕</button>
                        </div>
                    </div>`).join('');
            }

            const { data: agends } = await _supabase.from('agendamentos').select('*').order('dia').order('hora');
            if (agends) {
                document.getElementById('lista-agendamentos').innerHTML = agends.map(a => `
                    <div class="p-5 border-l-8 border-amber-500 bg-white rounded-2xl shadow-sm flex justify-between items-center border">
                        <div>
                            <p class="text-[10px] font-bold text-amber-600">${a.dia.split('-').reverse().join('/')} às ${a.hora.substring(0,5)}</p>
                            <h4 class="font-bold text-lg uppercase">${a.cliente}</h4>
                            <p class="text-[10px] text-zinc-400 font-black uppercase">${a.servico} | PROF: ${a.barbeiro}</p>
                        </div>
                        <button onclick="removerAgendamento(${a.id})" class="text-zinc-200 hover:text-red-500 text-2xl">✕</button>
                    </div>`).join('') || '<p class="text-zinc-400 italic text-center py-10">Nenhum agendamento ativo.</p>';
            }
        }

        async function editarPrecoServico(id, nome, precoAtual) {
            const novoPreco = prompt(`Novo preço para: ${nome}`, precoAtual);
            if (novoPreco !== null && novoPreco !== "") {
                const valor = parseFloat(novoPreco.replace(',', '.'));
                if (!isNaN(valor)) {
                    await _supabase.from('servicos').update({ preco: valor }).eq('id', id);
                    renderizarTudo();
                }
            }
        }

        async function adicionarBarbeiro() {
            const nome = document.getElementById('novo-barbeiro-nome').value;
            if(nome) { await _supabase.from('barbeiros').insert([{ nome }]); document.getElementById('novo-barbeiro-nome').value = ''; renderizarTudo(); }
        }

        async function adicionarServico() {
            const nome = document.getElementById('novo-servico-nome').value;
            const preco = document.getElementById('novo-servico-preco').value;
            if(nome && preco) { await _supabase.from('servicos').insert([{ nome, preco: parseFloat(preco) }]); document.getElementById('novo-servico-nome').value = ''; document.getElementById('novo-servico-preco').value = ''; renderizarTudo(); }
        }

        async function gerarGradeHorarios() {
            const dia = document.getElementById('agendamento-dia').value;
            const barbeiro = document.getElementById('select-barbeiros-cliente').value;
            const grade = document.getElementById('grade-horarios');
            if (!dia || !barbeiro) return;
            const { data: ocupados } = await _supabase.from('agendamentos').select('hora').eq('dia', dia).eq('barbeiro', barbeiro);
            const horasOcupadas = ocupados ? ocupados.map(o => o.hora.substring(0, 5)) : [];
            grade.innerHTML = '';
            for (let h = 10; h <= 19; h++) {
                const horaStr = `${h.toString().padStart(2, '0')}:00`;
                const isOcupado = horasOcupadas.includes(horaStr);
                const btn = document.createElement('button');
                btn.type = 'button'; btn.innerText = horaStr;
                btn.className = `p-3 rounded-2xl border-2 font-bold transition-all btn-horario ${isOcupado ? '' : 'border-amber-500 text-amber-600'}`;
                btn.disabled = isOcupado;
                btn.onclick = () => {
                    document.querySelectorAll('.btn-horario').forEach(b => b.classList.remove('horario-selecionado'));
                    btn.classList.add('horario-selecionado');
                    document.getElementById('horario-selecionado').value = horaStr;
                    document.getElementById('btn-confirmar').disabled = false;
                    document.getElementById('btn-confirmar').classList.replace('bg-zinc-300', 'bg-zinc-900');
                };
                grade.appendChild(btn);
            }
        }

        async function realizarAgendamento(e) {
            e.preventDefault();
            const dados = {
                cliente: document.getElementById('cliente-nome').value,
                servico: document.getElementById('select-servicos').value,
                barbeiro: document.getElementById('select-barbeiros-cliente').value,
                dia: document.getElementById('agendamento-dia').value,
                hora: document.getElementById('horario-selecionado').value
            };
            const { error } = await _supabase.from('agendamentos').insert([dados]);
            if(!error) { alert("Agendamento Confirmado!"); e.target.reset(); document.getElementById('grade-horarios').innerHTML = ''; renderizarTudo(); }
        }

        async function removerAgendamento(id) { if(confirm("Remover?")) { await _supabase.from('agendamentos').delete().eq('id', id); renderizarTudo(); } }
        async function removerBarbeiro(id) { if(confirm("Remover?")) { await _supabase.from('barbeiros').delete().eq('id', id); renderizarTudo(); } }
        async function removerServico(id) { if(confirm("Remover?")) { await _supabase.from('servicos').delete().eq('id', id); renderizarTudo(); } }

        window.onload = renderizarTudo;
    </script>
</body>
</html>
