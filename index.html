<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MotoExpress SaaS - Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.95);
            --primary-blue: #3b82f6;
            --text-main: #f8fafc;
            --accent-green: #10b981;
        }

        body { background-color: var(--bg-dark); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; overflow-x: hidden; }
        .glass-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 1.2rem; margin-bottom: 1rem; }
        .form-control { background-color: #1e293b !important; border: 1px solid #334155 !important; color: #fff !important; padding: 12px; }
        .btn-primary-custom { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); border: none; padding: 15px; font-weight: bold; border-radius: 12px; width: 100%; color: white; }
        
        .chat-box { background: #0a0f1d; border-radius: 12px; height: 250px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; border: 1px solid #334155; }
        .msg { margin-bottom: 10px; padding: 10px 14px; border-radius: 18px; max-width: 80%; font-size: 0.95rem; }
        .msg-me { background: var(--primary-blue); align-self: flex-end; color: white; border-bottom-right-radius: 4px; }
        .msg-other { background: #334155; align-self: flex-start; color: white; border-bottom-left-radius: 4px; }

        #map { height: 250px; width: 100%; border-radius: 15px; margin-top: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="authSection" class="container py-5">
    <div class="glass-card mx-auto" style="max-width: 400px;">
        <h2 class="text-center text-primary fw-bold mb-4">MotoExpress</h2>
        <input type="email" id="loginEmail" class="form-control mb-2" placeholder="E-mail">
        <input type="password" id="loginSenha" class="form-control mb-3" placeholder="Senha">
        <button id="btnLoginAction" class="btn-primary-custom">ENTRAR</button>
    </div>
</div>

<div id="mainApp" class="container py-3" style="display:none;">
    <div class="d-flex justify-content-between align-items-center mb-2">
        <span class="fw-bold text-primary">MOTOEXPRESS</span>
        <button id="btnLogout" class="btn btn-sm btn-outline-danger">Sair</button>
    </div>

    <!-- SAUDAÇÃO PERSONALIZADA -->
    <div class="mb-4">
        <h5 id="saudacaoUsuario" class="fw-bold text-white m-0"></h5>
    </div>

    <!-- AREA CLIENTE -->
    <div id="areaCliente" class="hidden">
        <div id="formSolicitacao" class="glass-card">
            <input type="text" id="origem" class="form-control mb-2" placeholder="Onde retira?">
            <input type="text" id="destino" class="form-control mb-3" placeholder="Onde entrega?">
            <button id="btnCalcular" class="btn btn-outline-primary w-100 mb-2">CALCULAR VALOR</button>
            <div id="displayPreco" class="text-center py-2 hidden">
                <h4 class="text-success m-0 mb-2">R$ <span id="valorFinal">0,00</span></h4>
                <button id="btnSolicitar" class="btn-primary-custom">PEDIR MOTOBOY</button>
            </div>
        </div>
        
        <div id="statusPedidoCliente"></div>

        <div id="containerAcompanhamento" class="hidden">
            <div id="chatCliente" class="glass-card">
                <div id="boxChatCliente" class="chat-box mb-2"></div>
                <div class="input-group">
                    <input type="text" id="inputChatCliente" class="form-control" placeholder="Falar com motoboy...">
                    <button class="btn btn-primary" onclick="enviarMensagem('cliente')"><i class="bi bi-send"></i></button>
                </div>
            </div>
            <div id="map"></div>
        </div>
    </div>

    <!-- AREA MOTOBOY -->
    <div id="areaMotoboy" class="hidden">
        <div id="jobAtivo"></div>
        <div id="chatMotoboy" class="glass-card hidden">
            <div id="boxChatMotoboy" class="chat-box mb-2"></div>
            <div class="input-group">
                <input type="text" id="inputChatMotoboy" class="form-control" placeholder="Falar com cliente...">
                <button class="btn btn-primary" onclick="enviarMensagem('motoboy')"><i class="bi bi-send"></i></button>
            </div>
        </div>
        <p class="text-warning small fw-bold mt-3">ENTREGAS DISPONÍVEIS</p>
        <div id="listaDisponiveis"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, addDoc, query, where, onSnapshot, updateDoc, serverTimestamp, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBsnN_KrorIrJD3faVOxqFD3SfUILr7XUY",
        authDomain: "motoexpress-887ba.firebaseapp.com",
        projectId: "motoexpress-887ba",
        storageBucket: "motoexpress-887ba.appspot.com",
        messagingSenderId: "931221356023",
        appId: "1:931221356023:web:7f6f5e4d3c2b1a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Config de Ganhos
    const COMISSAO_APP = 0.20; // Sua parte (20%)

    let map, marker, pedidoAtivoId = null, precoGlobal = 0, tipoUsuario = null;

    // Bloqueia permissão de push no navegador por script
    if ("Notification" in window) {
        Notification.requestPermission = () => Promise.resolve("denied");
    }

    onAuthStateChanged(auth, async u => {
        if(u) {
            const docU = await getDoc(doc(db, "usuarios", u.uid));
            if(docU.exists()) {
                const dados = docU.data();
                tipoUsuario = dados.tipo;
                const nomeUser = dados.nome || "Usuário";

                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('mainApp').style.display = 'block';
                
                const saudacao = document.getElementById('saudacaoUsuario');
                if(tipoUsuario === 'cliente') {
                    saudacao.innerHTML = `Olá, cliente <span class="text-primary">${nomeUser}</span>!`;
                    document.getElementById('areaCliente').classList.remove('hidden');
                    monitorarCliente(u.uid);
                } else {
                    saudacao.innerHTML = `Olá, motoboy <span class="text-success">${nomeUser}</span>!`;
                    document.getElementById('areaMotoboy').classList.remove('hidden');
                    monitorarMotoboy();
                }
            }
        }
    });

    function monitorarCliente(uid) {
        const q = query(collection(db, "pedidos"), where("clienteId", "==", uid), orderBy("data", "desc"), limit(1));
        onSnapshot(q, snap => {
            const statusDiv = document.getElementById('statusPedidoCliente');
            const form = document.getElementById('formSolicitacao');
            const acompanhamento = document.getElementById('containerAcompanhamento');
            
            statusDiv.innerHTML = "";

            if (snap.empty) {
                form.classList.remove('hidden');
                return;
            }

            const d = snap.docs[0];
            const p = d.data();

            if (p.status === 'finalizado') {
                form.classList.remove('hidden');
                acompanhamento.classList.add('hidden');
                pedidoAtivoId = null;
            } else {
                form.classList.add('hidden');
                pedidoAtivoId = d.id;
                if (p.status === 'pendente') {
                    statusDiv.innerHTML = `<div class="glass-card border-warning text-center">Aguardando um motoboy aceitar...</div>`;
                } else if (p.status === 'aceito') {
                    acompanhamento.classList.remove('hidden');
                    statusDiv.innerHTML = `<div class="glass-card border-primary text-center">O motoboy está a caminho!</div>`;
                    monitorarChat(d.id, 'boxChatCliente');
                    carregarMapa(p.motoboyId);
                }
            }
        });
    }

    function monitorarMotoboy() {
        if(navigator.geolocation) navigator.geolocation.watchPosition(p => {
            updateDoc(doc(db, "usuarios", auth.currentUser.uid), { lat: p.coords.latitude, lng: p.coords.longitude });
        });

        onSnapshot(query(collection(db, "pedidos"), where("status", "==", "pendente")), snap => {
            const lista = document.getElementById('listaDisponiveis'); lista.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                const ganhoMota = p.valorTotal * (1 - COMISSAO_APP);
                lista.innerHTML += `<div class="glass-card">
                    <div class="d-flex justify-content-between"><b>Ganhos: R$ ${ganhoMota.toFixed(2)}</b> <small>R$ ${p.valorTotal.toFixed(2)}</small></div>
                    <p class="small my-1">${p.destino}</p>
                    <button class="btn btn-success btn-sm w-100" onclick="aceitarPedido('${d.id}')">ACEITAR</button>
                </div>`;
            });
        });

        onSnapshot(query(collection(db, "pedidos"), where("motoboyId", "==", auth.currentUser.uid), where("status", "==", "aceito")), snap => {
            const container = document.getElementById('jobAtivo'); container.innerHTML = "";
            if(!snap.empty) {
                pedidoAtivoId = snap.docs[0].id;
                document.getElementById('chatMotoboy').classList.remove('hidden');
                monitorarChat(pedidoAtivoId, 'boxChatMotoboy');
                container.innerHTML = `<div class="glass-card border-success">Corrida Ativa <button class="btn btn-sm btn-success float-end" onclick="finalizarEntrega('${pedidoAtivoId}')">CONCLUIR</button></div>`;
            } else {
                document.getElementById('chatMotoboy').classList.add('hidden');
                pedidoAtivoId = null;
            }
        });
    }

    function monitorarChat(id, boxId) {
        onSnapshot(query(collection(db, "pedidos", id, "chat"), orderBy("data", "asc")), snap => {
            const box = document.getElementById(boxId);
            let html = "";
            snap.forEach(m => {
                const isMe = m.data().senderId === auth.currentUser.uid;
                html += `<div class="msg ${isMe ? 'msg-me' : 'msg-other'}">${m.data().texto}</div>`;
            });
            box.innerHTML = html;
            box.scrollTo({ top: box.scrollHeight, behavior: 'instant' });
        });
    }

    window.enviarMensagem = async (tipo) => {
        const input = document.getElementById(tipo === 'cliente' ? 'inputChatCliente' : 'inputChatMotoboy');
        if(input.value.trim() && pedidoAtivoId) {
            await addDoc(collection(db, "pedidos", pedidoAtivoId, "chat"), {
                texto: input.value, senderId: auth.currentUser.uid, data: serverTimestamp()
            });
            input.value = "";
        }
    };

    function carregarMapa(mid) {
        if (!map) {
            map = L.map('map').setView([-15, -47], 4);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            marker = L.marker([0, 0]).addTo(map);
        }
        onSnapshot(doc(db, "usuarios", mid), d => {
            if(d.exists()) {
                const pos = [d.data().lat, d.data().lng];
                marker.setLatLng(pos); map.setView(pos, 16);
            }
        });
    }

    document.getElementById('btnCalcular').addEventListener('click', () => {
        precoGlobal = (Math.random() * 8 + 6);
        document.getElementById('valorFinal').innerText = precoGlobal.toFixed(2);
        document.getElementById('displayPreco').classList.remove('hidden');
    });

    document.getElementById('btnSolicitar').addEventListener('click', async () => {
        const o = document.getElementById('origem').value;
        const d = document.getElementById('destino').value;
        if(o && d) {
            await addDoc(collection(db, "pedidos"), {
                origem: o, destino: d, valorTotal: precoGlobal,
                status: "pendente", clienteId: auth.currentUser.uid, data: serverTimestamp()
            });
            document.getElementById('displayPreco').classList.add('hidden');
        }
    });

    window.aceitarPedido = id => updateDoc(doc(db, "pedidos", id), { status: "aceito", motoboyId: auth.currentUser.uid });
    window.finalizarEntrega = id => updateDoc(doc(db, "pedidos", id), { status: "finalizado" });
    
    document.getElementById('btnLoginAction').addEventListener('click', () => {
        signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginSenha').value).catch(() => alert("Dados inválidos"));
    });
    document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));
</script>
</body>
</html>
